apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-service
  namespace: institutional-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-service
  template:
    metadata:
      labels:
        app: student-service
    spec:
      containers:
      - name: student-service
        image: student-service:latest
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: student-service
  namespace: institutional-platform
spec:
  selector:
    app: student-service
  ports:
    - protocol: TCP
      port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teacher-service
  namespace: institutional-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: teacher-service
  template:
    metadata:
      labels:
        app: teacher-service
    spec:
      containers:
      - name: teacher-service
        image: teacher-service:latest
        ports:
        - containerPort: 3003
        env:
        - name: PORT
          value: "3003"
        - name: STUDENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: STUDENT_SERVICE_URL
        - name: WEBHOOK_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: platform-config
              key: WEBHOOK_SERVICE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: teacher-service
  namespace: institutional-platform
spec:
  selector:
    app: teacher-service
  ports:
    - protocol: TCP
      port: 3003
      targetPort: 3003
