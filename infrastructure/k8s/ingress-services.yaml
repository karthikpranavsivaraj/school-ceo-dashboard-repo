apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: institutional-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: api-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: platform-config
        env:
        - name: PORT
          value: "8080"
        - name: JWT_SECRET
          value: "super-secret-key"
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "200m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: institutional-platform
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: institutional-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ceo-api
  namespace: institutional-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ceo-api
  template:
    metadata:
      labels:
        app: ceo-api
    spec:
      containers:
      - name: ceo-api
        image: ceo-api:latest
        ports:
        - containerPort: 3006
        envFrom:
        - configMapRef:
            name: platform-config
---
apiVersion: v1
kind: Service
metadata:
  name: ceo-api
  namespace: institutional-platform
spec:
  selector:
    app: ceo-api
  ports:
    - protocol: TCP
      port: 3006
      targetPort: 3006
